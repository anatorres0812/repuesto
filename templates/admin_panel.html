<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Contactos AAPHAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        h1 { color: #2d6a4f; margin-bottom: 0.5rem; }
        .count { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th {
            background: #2d6a4f;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 0.85rem;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
            color: #333;
        }
        tr:hover { background: #f9f9f9; }
        tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>
    <h1>Panel Admin - Contactos AAPHAL</h1>
    <p class="count">Total registros: <strong>{{ contactos|length }}</strong></p>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Asunto</th>
                <th>Mensaje</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            {% for c in contactos %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.nombre }}</td>
                <td>{{ c.correo }}</td>
                <td>{{ c.telefono }}</td>
                <td>{{ c.asunto }}</td>
                <td>{{ c.mensaje or '' }}</td>
                <td>{{ c.fecha }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
